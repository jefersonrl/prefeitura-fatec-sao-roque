<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Histórico de Cultura • São Roque Agrícola</title>
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --sidebar-width: 80px;
            --brand-green: #198754;
            --bg-light: #f8f9fa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            overflow-x: hidden;
        }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--brand-green);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 1000;
        }
        .sidebar-icon {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            margin-bottom: 25px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }
        .sidebar-icon:hover, .sidebar-icon.active {
            color: #fff;
            transform: scale(1.1);
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }
        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                bottom: 0;
                top: auto;
                padding-top: 0;
                padding-bottom: 0;
            }
            .sidebar-icon {
                margin-bottom: 0;
                font-size: 1.2rem;
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
                padding-bottom: 80px; /* Espaço para barra inferior */
            }
            .section-card {
                padding: 15px;
            }
            .d-flex.justify-content-between {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
            border: 2px solid var(--brand-green);
        }
        .section-title {
            font-weight: 700;
            color: var(--brand-green);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 10px;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #555;
        }
        .btn-save {
            background-color: var(--brand-green);
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            transition: 0.3s;
        }
        .btn-save:hover {
            background-color: #146c43;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
    <a href="home.html" class="sidebar-icon" title="Dashboard"><i class="bi bi-speedometer2"></i></a>
    <a href="produtores.html" class="sidebar-icon" title="Produtores"><i class="bi bi-people"></i></a>
    <a href="culturas.html" class="sidebar-icon active" title="Culturas"><i class="bi bi-tree"></i></a>
    <a href="mapa_propriedades.html" class="sidebar-icon" title="Mapa de Propriedades"><i class="bi bi-geo-alt"></i></a>
</nav>

<main class="main-content">
    <header class="header-top">
        <div>
            <h1 class="h4 mb-0 fw-bold">Registrar Ciclo de Cultura</h1>
            <p class="text-muted small mb-3">Adicionar novo marco histórico ao Sítio dos Vinhedos Góes</p>
            
            <!-- Menu de Atalhos Rápidos -->
            <div class="d-flex gap-2 mb-3">
                <a href="home.html" class="btn btn-outline-success btn-sm"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="produtores.html" class="btn btn-outline-success btn-sm"><i class="bi bi-people"></i> Produtores</a>
                <a href="mapa_propriedades.html" class="btn btn-outline-success btn-sm"><i class="bi bi-geo-alt"></i> Mapa com Filtros</a>
                <a href="culturas.html" class="btn btn-outline-success btn-sm"><i class="bi bi-tree"></i> Histórico</a>
                <a href="perfil.html" class="btn btn-outline-success btn-sm"><i class="bi bi-person-circle"></i> Perfil</a>
            </div>
        </div>
        <div class="user-profile">
            <div class="text-end d-none d-sm-block">
                <div class="fw-bold small">Técnico Agrícola</div>
                <button onclick="logout()" class="btn btn-link p-0 text-danger text-decoration-none" style="font-size: 0.7rem;">Sair do Sistema</button>
            </div>
            <a href="perfil.html" class="avatar text-decoration-none">SR</a>
        </div>
    </header>

    <div class="d-flex justify-content-end mb-4">
        <a href="culturas.html" class="btn btn-outline-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i> Voltar</a>
        <button type="submit" form="formCultura" class="btn btn-save btn-sm"><i class="bi bi-check-lg"></i> Salvar Registro</button>
    </div>

    <form id="formCultura">
        <!-- Seleção de Contexto -->
        <div class="section-card">
            <h2 class="section-title h5"><i class="bi bi-geo-alt"></i> Identificação da Área</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="produtor" class="form-label">Produtor Responsável</label>
                    <select class="form-select" id="produtor" required>
                        <option value="joao_goes">João da Silva Góes (4ª Geração)</option>
                        <option value="antonio_goes">Antônio Góes (Histórico)</option>
                        <option value="francisco_goes">Francisco Góes (Fundador)</option>
                        <option value="outro">Outro Produtor...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="area" class="form-label">Área / Propriedade</label>
                    <select class="form-select" id="area" required>
                        <option value="sitio_vinhedos">Sítio dos Vinhedos Góes (Canguera)</option>
                        <option value="fazenda_boa_vista">Fazenda Boa Vista</option>
                        <option value="chacara_primavera">Chácara Primavera</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Detalhes do Cultivo -->
        <div class="section-card">
            <h2 class="section-title h5"><i class="bi bi-tree"></i> Detalhes do Ciclo / Cultura</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="tituloMarco" class="form-label">Título do Ciclo / Marco Histórico</label>
                    <input type="text" class="form-control" id="tituloMarco" placeholder="Ex: Expansão e Modernização, Reforma de Vinhedo, Fundação" required>
                </div>
                <div class="col-md-6">
                    <label for="cultura" class="form-label">Cultura / Cultivar</label>
                    <input type="text" class="form-control" id="cultura" placeholder="Ex: Uva Niágara, Alcachofra Roxa" required>
                </div>

                <div class="col-md-3">
                    <label for="produtor" class="form-label">Produtor Responsável</label>
                    <input type="text" class="form-control" id="produtor" placeholder="Ex: João da Silva Góes" required>
                </div>
                <div class="col-md-3">
                    <label for="geracao" class="form-label">Geração / Relação Familiar</label>
                    <input type="text" class="form-control" id="geracao" placeholder="Ex: 4ª Geração, Fundador">
                </div>
                <div class="col-md-3">
                    <label for="areaHectares" class="form-label">Área Utilizada (Hectares)</label>
                    <input type="number" step="0.1" class="form-control" id="areaHectares" placeholder="Ex: 5.2" required>
                </div>
                <div class="col-md-3">
                    <label for="tecnico" class="form-label">Técnico Responsável</label>
                    <input type="text" class="form-control" id="tecnico" placeholder="Nome do Técnico">
                </div>

                <div class="col-md-4">
                    <label for="dataInicio" class="form-label">Data de Início (Ano/Mês)</label>
                    <input type="month" class="form-control" id="dataInicio" required>
                </div>
                <div class="col-md-4">
                    <label for="dataFim" class="form-label">Data de Término (Ano/Mês)</label>
                    <input type="month" class="form-control" id="dataFim">
                    <small class="text-muted">Vazio se for o ciclo atual.</small>
                </div>
                <div class="col-md-4">
                    <label for="statusCiclo" class="form-label">Status / Tipo de Marco</label>
                    <select class="form-select" id="statusCiclo">
                        <option value="ativo">Ciclo Ativo (Verde)</option>
                        <option value="finalizado">Ciclo Finalizado (Cinza)</option>
                        <option value="historico">Marco Histórico / Fundação (Dourado)</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label for="resultado" class="form-label">Resultado / Resumo da Trajetória (Opcional)</label>
                    <input type="text" class="form-control" id="resultado" placeholder="Ex: 12 Toneladas colhidas, Reforma concluída, Aquisição das terras">
                </div>

                <div class="col-md-12">
                    <label for="descricao" class="form-label">Narrativa Histórica / Observações Detalhadas</label>
                    <textarea class="form-control" id="descricao" rows="4" placeholder="Descreva a história deste ciclo, técnicas utilizadas ou marcos importantes da família nesta época..."></textarea>
                </div>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="text-end mb-5">
            <button type="button" class="btn btn-outline-secondary me-2">Limpar Campos</button>
            <button type="submit" class="btn btn-save px-5">Salvar Marco Histórico</button>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function logout() {
        if (confirm("Deseja realmente sair do sistema?")) {
            window.location.href = 'index.html';
        }
    }

    // Mock de Sucesso ao Salvar
    document.getElementById('formCultura').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Histórico de cultura registrado com sucesso!');
        window.location.href = 'culturas.html';
    });
</script>

</body>
</html>
