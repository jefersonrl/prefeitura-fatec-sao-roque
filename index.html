<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prefeitura de São Roque • Login</title>
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), 
                        url('https://lh3.googleusercontent.com/p/AF1QipNqYv9m_I0X8Fv9_W_P-C3-F9S_S-v8-S-v8-S-v=s1024') no-repeat center center fixed;
            background-color: #198754;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.2);
            max-width: 420px;
            width: 90%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .brand-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 1rem;
        }
        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.1);
        }
        .btn-success {
            background-color: #198754;
            border-color: #198754;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-success:hover, .btn-success:focus {
            background-color: #146c43;
            border-color: #146c43;
        }
        .footer-text {
            font-size: 0.875rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-card p-4 p-md-5">
        <div class="text-center mb-4">
            <!-- Branding: Logo Prefeitura de São Roque -->
            <img src="img/logo_sao_roque_transparente.png" alt="Prefeitura de São Roque" class="brand-logo">
            <p class="text-muted small">Acesso restrito a técnicos e administradores</p>
        </div>

        <h2 class="h4 text-center mb-4 fw-bold">Login do Sistema</h2>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="username" placeholder="Seu usuário">
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" placeholder="Sua senha">
                </div>
            </div>

            <!-- Manter conectado / Esqueci senha -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">
                        Manter conectado
                    </label>
                </div>
                <a href="#" class="text-decoration-none small text-success">Esqueci minha senha</a>
            </div>

            <!-- Botão Entrar -->
            <button type="submit" id="loginBtn" class="btn btn-success w-100 mb-3">Entrar</button>
        </form>

        <div class="text-center mt-4 footer-text">
            <p class="mb-0">Sistema de Assistência Técnica e Extensão Rural</p>
            <p class="mb-0 text-muted" style="font-size: 0.75rem;">© 2026 Fatecs São Roque, Ferraz de Vasconcelos e Suzano.</p>
        </div>
    </div>
</div>

<!-- Bootstrap 5.3 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Acessando...';
        
        // Simulação de delay para efeito visual e redirecionamento para Home
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 800);
    });
</script>

</body>
</html>
